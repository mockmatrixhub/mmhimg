name: Generate Image Manifest

on:
  push:
    paths:
      - 'ssc/**/*.jpg'
      - 'ssc/**/*.jpeg'
      - 'ssc/**/*.png'
      - 'ssc/**/*.webp'
  workflow_dispatch:

jobs:
  build-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build manifest.json
        run: |
          find ssc \
            -type f \( -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.png' -o -iname '*.webp' \) \
            -printf 'ssc/%P\n' \
            | sort \
            | jq -R -s -c 'split("\n") | map(select(length > 0))' > manifest.json

      - name: Commit manifest if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --cached --quiet || git commit -m "Update image manifest [skip ci]"
          git push
